<!DOCTYPE html>
<html lang="uz">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mening Havolalarim | Link in Bio</title>
    <meta name="description" content="Mening barcha ijtimoiy tarmoqlarimga havolalar.">
    <link rel="stylesheet" href="style.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <main class="profile-card">
            <div class="profile-img-container">
                <img src="111.jpg" alt="Mening rasmim" class="profile-img" id="profile-pic">
            </div>
            
            <h1 id="user-name">Fayzullo</h1>
            <p class="bio">Digital Creator | Blogger | Developer</p>
            
            <div class="links-container">
                <a href="https://www.instagram.com/rayimjonovvv77?igsh=N2FnNWxzMWJra2Fo&utm_source=qr" class="link-item instagram" target="_blank" rel="noopener">
                    <i class="fab fa-instagram"></i> Instagram
                </a>
                <a href="https://t.me/ZTLAND100k" class="link-item telegram" target="_blank" rel="noopener">
                    <i class="fab fa-telegram"></i> Telegram
                </a>
                <a href="#" class="link-item facebook" target="_blank" rel="noopener">
                    <i class="fab fa-facebook"></i> Facebook
                </a>
                <a href="#" class="link-item whatsapp" target="_blank" rel="noopener">
                    <i class="fab fa-whatsapp"></i> WhatsApp
                </a>
                <a href="#" class="link-item youtube" target="_blank" rel="noopener">
                    <i class="fab fa-youtube"></i> YouTube
                </a>
            </div>
        </main>
        
        <footer class="footer">
            <p>&copy; 2026. Barcha huquqlar himoyalangan.</p>
        </footer>
    </div>
    <script src="script.js"></script>
</body>
</html>
